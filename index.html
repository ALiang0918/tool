<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card-bg: #fff;
    --text: #1a1a1a;
    --text-secondary: #666;
    --border: #ddd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --card-bg: #1e1e1e;
      --text: #e0e0e0;
      --text-secondary: #999;
      --border: #333;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh;
         display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .container { max-width: 600px; width: 100%; padding: 24px; text-align: center; }

  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 40px; }

  .cards { display: flex; flex-direction: column; gap: 16px; }
  .card { display: block; background: var(--card-bg); border: 1px solid var(--border);
           border-radius: 12px; padding: 24px; text-decoration: none; color: var(--text);
           transition: all .15s; text-align: left; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .card:active { transform: translateY(0); }
  .card .icon { font-size: 28px; margin-bottom: 8px; }
  .card .name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .card .desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  footer { margin-top: 40px; font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="container">
  <h1>🔧 工具箱</h1>
  <p class="subtitle">开发中常用的几个小工具</p>
  <div class="cards">
    <a class="card" href="java-compare.html">
      <div class="icon">☕</div>
      <div class="name">Java 字段对比器</div>
      <div class="desc">对比两个 Java 对象的属性差异，快速定位共有字段、类型冲突、独有字段</div>
    </a>
    <a class="card" href="sql-formatter.html">
      <div class="icon">🗄️</div>
      <div class="name">SQL IN 条件格式化</div>
      <div class="desc">粘贴多行数据，一键生成逗号分隔的 IN 条件，支持引号、去重、排序</div>
    </a>
  </div>
  <footer>GitHub Pages · 纯前端 · 零依赖</footer>
</div>
</body>
</html>
